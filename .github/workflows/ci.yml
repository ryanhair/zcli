name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default: every job here checks out, builds, and tests — none
# needs to write anything. The `changes` job further narrows its own token
# (adds `pull-requests: read` for the paths-filter API call); no other job
# needs elevation above this default.
permissions:
  contents: read

jobs:
  # Classifies the diff so the expensive jobs below only run when paths they
  # actually cover changed. Deliberately job-level `if:` gating (each job
  # declares `needs: changes`) rather than workflow-level `paths:` filtering —
  # a path-filtered workflow never reports its checks, which leaves required
  # status checks pending forever, whereas a skipped job reports "skipped"
  # and satisfies them.
  #
  # Fail-open design, in three layers:
  #   1. Pushes to main always run EVERYTHING — gating applies only to PRs, so
  #      a wrong filter can delay feedback to merge time but can never let
  #      main go unvalidated.
  #   2. The `ci-full` PR label forces the full matrix (escape hatch when a
  #      filter is suspected of lying).
  #   3. Every filter includes this workflow file itself, so a change to the
  #      filters re-runs everything they gate.
  # `fmt` and `version-sync` are not gated: they finish in seconds — about
  # what this job costs — and they are the only checks left on docs-only PRs.
  changes:
    name: classify changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read # paths-filter reads the PR file list via the API
    outputs:
      code: ${{ steps.resolve.outputs.code }}
      cli: ${{ steps.resolve.outputs.cli }}
      secrets: ${{ steps.resolve.outputs.secrets }}
      examples: ${{ steps.resolve.outputs.examples }}
    steps:
      # Only needed for push events (PR events use the API), but checking out
      # unconditionally keeps the job shape simple.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Filter vocabulary (the package dependency graph is top-heavy — theme/
      # terminal/vterm/ui sit under nearly everything — so these gates are
      # coarse by design; finer affected-package selection happens later,
      # inside the build, not here):
      #   code:     any Zig source anywhere → the cross-OS unit-test matrix.
      #   cli:      anything the zcli binary embeds (all of packages/ + the
      #             CLI itself) → e2e matrix + release-mode builds. Only
      #             examples-only and docs-only PRs miss this.
      #   secrets:  the zcli_secrets plugin + core's step wiring → the 3-OS
      #             live-keychain job, which otherwise ran on every PR for
      #             code that changes rarely.
      #   examples: the canonical examples or anything they compile against.
      - name: Classify diff
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'projects/**'
              - 'examples/**'
              - 'build.zig'
              - 'build.zig.zon'
              - '.github/workflows/ci.yml'
            cli:
              - 'packages/**'
              - 'projects/zcli/**'
              - 'build.zig'
              - 'build.zig.zon'
              - '.github/workflows/ci.yml'
            secrets:
              - 'packages/core/src/plugins/zcli_secrets/**'
              - 'packages/core/build.zig'
              - 'packages/core/build.zig.zon'
              - 'build.zig'
              - 'build.zig.zon'
              - '.github/workflows/ci.yml'
            examples:
              - 'examples/**'
              - 'packages/**'
              - 'build.zig'
              - 'build.zig.zon'
              - '.github/workflows/ci.yml'

      - name: Resolve gates (full run on main push or the ci-full label)
        id: resolve
        shell: bash
        env:
          FULL: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci-full') }}
          CODE: ${{ steps.filter.outputs.code }}
          CLI: ${{ steps.filter.outputs.cli }}
          SECRETS: ${{ steps.filter.outputs.secrets }}
          EXAMPLES: ${{ steps.filter.outputs.examples }}
        run: |
          gate() {
            local v=false
            if [ "$FULL" = "true" ] || [ "$2" = "true" ]; then v=true; fi
            echo "$1=$v" >> "$GITHUB_OUTPUT"
            echo "$1: $v"
          }
          gate code "$CODE"
          gate cli "$CLI"
          gate secrets "$SECRETS"
          gate examples "$EXAMPLES"

  fmt:
    name: zig fmt check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Explicit paths rather than "." — scripts/ and website/ contain no Zig
      # source, and this keeps cache/output dirs out of scope.
      - name: Check formatting
        run: zig fmt --check packages projects examples build.zig

      # Output-contract invariant: runtime code must route ALL output and
      # process exit through the command context (context.stdout()/stderr()/
      # exit()/fail()), never std.debug.print or std.process.exit. Those bypass
      # the framework's buffered streams — output is silently dropped when the
      # process exits without flushing — and defeat stream overrides.
      #
      # Scope widened beyond plugins (PR #237) to all of packages/core/src plus
      # the CLI's own commands, both non-test. Exempt, with reasons:
      #   - *_test.zig and the two mixed files with in-file test blocks
      #     (options/array_utils.zig, commands/add/_generate.zig): test
      #     diagnostics, not runtime output.
      #   - comment / doc-example / multiline-string ('\\') lines: not code.
      #   - context.zig: THE sanctioned exit — it flushes buffered output first.
      #   - registry/compiled.zig: the CLI entry point's exit(1) after a reported
      #     error, which runs only once executeWithStdio's `defer stdio.flush()`
      #     has fired and the console has been restored.
      #   - build_utils/: runs at build time (*std.Build) — no io, no context,
      #     no buffered stream exists; std.debug.print is the build-time channel.
      - name: No std.debug.print / std.process.exit outside the context (output contract)
        shell: bash
        run: |
          offenders=$(grep -rnE 'std\.debug\.print|std\.process\.exit' \
               --include='*.zig' \
               --exclude='*_test.zig' \
               packages/core/src/ projects/zcli/src/commands/ \
             | grep -vE ':[0-9]+:[[:space:]]*(///?|\\\\)' \
             | grep -vE 'packages/core/src/context\.zig:' \
             | grep -vE 'packages/core/src/registry/compiled\.zig:' \
             | grep -vE 'packages/core/src/build_utils/' \
             | grep -vE 'packages/core/src/options/array_utils\.zig:' \
             | grep -vE 'projects/zcli/src/commands/add/_generate\.zig:' \
             || true)
          if [ -n "$offenders" ]; then
            echo "::error::route output/exit through the command context (context.stdout()/stderr()/exit()/fail()), not std.debug.print/std.process.exit:"
            echo "$offenders"
            exit 1
          fi
          echo "output contract holds: no raw std.debug.print/std.process.exit in runtime code"

  # The framework (root build.zig.zon) and the CLI (projects/zcli/build.zig.zon)
  # ship in lockstep and MUST declare the same version — the CLI's `--version`
  # reads its own zon, the website + library tag read the root's. The README's
  # Quick Start pins the dependency to the release tag, so it must carry the
  # same version too. The release automation bumps all three together; this
  # guards the manual path from drifting them apart, which would otherwise
  # ship a mislabelled binary or a stale install instruction silently.
  version-sync:
    name: version consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Versions match across build.zig.zon files and README
        shell: bash
        run: |
          extract() { grep -m1 -oE '\.version = "[0-9]+\.[0-9]+\.[0-9]+"' "$1" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+'; }
          root=$(extract build.zig.zon)
          cli=$(extract projects/zcli/build.zig.zon)
          core=$(extract packages/core/build.zig.zon)
          readme=$(grep -m1 -oE '/zcli/archive/refs/tags/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz' README.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "root build.zig.zon:          $root"
          echo "projects/zcli/build.zig.zon: $cli"
          echo "packages/core/build.zig.zon: $core"
          echo "README.md dependency tag:    $readme"
          if [ -z "$root" ] || [ -z "$cli" ] || [ -z "$core" ] || [ -z "$readme" ]; then
            echo "::error::could not read a version from one of the build.zig.zon files or the README dependency tag"
            exit 1
          fi
          if [ "$root" != "$cli" ] || [ "$root" != "$core" ] || [ "$root" != "$readme" ]; then
            echo "::error::version drift: root=$root cli=$cli core=$core readme=$readme — the build.zig.zon files and the README dependency tag must all declare the same version"
            exit 1
          fi

      # The website's getting-started page shows a demo `install` transcript with
      # release-version lines ("Fetching latest release… zcli vX.Y.Z" and a
      # `zcli --version` line). Those versions are injected at build time from
      # assets/site-data.json, which sync-site-data.sh regenerates from the root
      # build.zig.zon before every zine build (locally via build.zig, in deploy
      # via deploy-docs.yml) — so they can't drift. What CAN regress is someone
      # hardcoding a version back into the transcript, so forbid that form and
      # require the injection to still be present.
      - name: Website transcript injects the release version (no hardcoded zcli versions)
        shell: bash
        run: |
          gs=website/layouts/getting-started.shtml
          hardcoded=$(grep -nE 'zcli v?[0-9]+\.[0-9]+\.[0-9]+' "$gs" || true)
          if [ -n "$hardcoded" ]; then
            echo "::error::hardcoded zcli version in $gs — inject it from site-data.json instead ($site.asset('site-data.json').ziggy().get('version')):"
            echo "$hardcoded"
            exit 1
          fi
          if ! grep -q "site-data.json" "$gs"; then
            echo "::error::$gs no longer reads site-data.json — did the transcript lose its version injection?"
            exit 1
          fi
          echo "$gs: no hardcoded versions; site-data.json injection present"

      # The one-line curl installer standardises on the branded zcli.sh host
      # (https://zcli.sh/install.sh) across README + every website layout. The
      # drift this catches is a stray raw.githubusercontent.com install URL —
      # the old form that slipped in on some pages. (The home page renders the
      # host without the scheme, and the getting-started demo terminal shows an
      # elided `…/install.sh` placeholder; both are the branded host, so we
      # simply forbid the wrong host rather than pin an exact string.)
      - name: Install URL uses the branded host, not raw.githubusercontent
        shell: bash
        run: |
          bad=$(grep -rnE 'raw\.githubusercontent\.com/[^ ]*install\.sh' README.md website/layouts || true)
          if [ -n "$bad" ]; then
            echo "::error::install URL drift — use https://zcli.sh/install.sh, not the raw GitHub URL. Offending lines:"
            echo "$bad"
            exit 1
          fi
          echo "No raw.githubusercontent.com install URLs — all install commands use the branded zcli.sh host"

  # Coverage instrumentation (kcov / llvm-cov) was considered here (#335) and
  # deliberately deferred rather than wired in: Zig 0.16 has no stable,
  # first-party coverage story, and every third-party route (kcov's DWARF
  # unwinding against Zig's codegen, llvm-cov needing a matching profile
  # runtime bundled with this Zig's LLVM) is fragile enough on a moving Zig
  # release to be its own maintenance burden — exactly what this repo's CI
  # philosophy (concrete assertions over qualitative feel, see the
  # output-contract check above) tries to avoid shipping half-working.
  # Revisit if Zig grows a built-in `-fcoverage`-equivalent.
  test:
    name: unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # No CI runner (nor a typical dev box) ships fish, so the completion
      # suite's `fish --no-execute` validation had never once run — the fish
      # generator's only coverage was escaping unit tests. Install it on the
      # cheapest leg (Linux) so the real-shell branch actually exercises fish,
      # and set ZCLI_REQUIRE_FISH=1 so a missing binary here is a hard failure
      # rather than a silent per-shell skip (guarding against regression to
      # never-validated). Other OS legs leave the flag unset — fish stays
      # optional there.
      - name: Install fish (Linux — enables the completion suite's fish branch)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fish

      # Runs the test suites for every package (packages/*) AND projects/zcli's
      # own unit tests on all three OSes. Windows is a first-class leg now that
      # the interactive `testing` harness compiles there (ConPTY backend); the
      # terminal stack is libc-free, so this guards portability across the board.
      # Every GitHub-hosted runner image (ubuntu, macos, windows) ships pwsh,
      # so the completion suite's real-pwsh syntax check must actually run on
      # all three legs — ZCLI_REQUIRE_PWSH=1 turns a missing/unfound binary
      # into a hard failure rather than a silent skip (the same
      # guard-against-never-validated as fish above, without needing an
      # install step).
      - name: Run tests
        env:
          ZCLI_REQUIRE_FISH: ${{ runner.os == 'Linux' && '1' || '' }}
          ZCLI_REQUIRE_PWSH: "1"
        run: zig build test

  windows-release-build:
    name: windows release build
    runs-on: windows-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Build the CLI natively in ReleaseSafe — a real Windows toolchain catches
      # native linking/ABI + optimize-mode issues that the release's
      # cross-compile from Linux would not. This is the only ReleaseSafe Windows
      # coverage on PRs (release.yml cross-compiles and is tag-triggered). The
      # `test` job now runs the unit suites natively on Windows, and the `e2e`
      # job builds the binary (Debug) and exercises it end to end, so a separate
      # smoke step here would be redundant.
      - name: Build zcli (native Windows, ReleaseSafe)
        working-directory: projects/zcli
        run: zig build -Doptimize=ReleaseSafe -Dstrip=true

  # The release cross-compiles the static-musl Linux binaries (release.yml's
  # build job, only on tag push), so PR CI never once built musl — and a
  # musl-only build-graph panic in the secrets backend (fixed in 1931528)
  # blocked the 0.19.0 release with a break PR CI could not have caught. This
  # job closes that gap: it mirrors release.yml's build invocation EXACTLY
  # (same `cd projects/zcli` + `zig build -Doptimize=ReleaseSafe -Dstrip=true -Dtarget=…`
  # per musl target) so the two can't drift and reopen the hole. x86_64 is a
  # static binary the x64 runner can execute, so smoke-test it (mirrors the
  # release's Smoke test step); aarch64 is build-only (can't run here).
  linux-musl-release-build:
    name: linux musl release build (${{ matrix.zig_target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - zig_target: x86_64-linux-musl
            smoke: true # static musl binary runs on the x64 runner
          - zig_target: aarch64-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # mlugg/setup-zig already caches the global Zig cache dir (~/.cache/zig
      # on Linux; local caches are redirected into it) between runs by
      # default — no separate actions/cache step is needed here or on any
      # other job in this file. Its cache key includes the runner OS
      # automatically, but NOT matrix variables, and this is the one job in
      # this workflow whose matrix axis (zig_target) doesn't vary by OS: both
      # legs run on ubuntu-latest but cross-compile genuinely different
      # targets (x86_64 vs aarch64 musl). Without an explicit cache-key the
      # two legs would thrash a single shared cache entry. (test/secrets/e2e
      # matrix only on `os`, which is already disambiguated for free.)
      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
          cache-key: ${{ matrix.zig_target }}

      # Byte-for-byte the release build command (release.yml → build job → Build
      # zcli). No test suite re-run — the `test` job already covers that; this
      # only guards that the release-mode musl cross-compile links and starts.
      - name: Build zcli (static musl, ReleaseSafe)
        working-directory: projects/zcli
        run: zig build -Doptimize=ReleaseSafe -Dstrip=true -Dtarget=${{ matrix.zig_target }}

      # Prove the artifact the release would publish actually starts, on the
      # target the runner can execute natively. Mirrors release.yml's smoke test.
      - name: Smoke test the binary
        if: matrix.smoke
        working-directory: projects/zcli
        run: |
          ./zig-out/bin/zcli --version
          ./zig-out/bin/zcli --help

  secrets:
    name: zcli_secrets backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.secrets == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # The Linux backend shells out — it links nothing (ADR-0010) — so no dev
      # headers are needed. The live round-trip exercises BOTH runtime backends,
      # so install the tools for each: gnome-keyring + dbus + secret-tool for the
      # Secret Service path, and pass + gnupg for the pass path. macOS (Keychain)
      # and Windows (Credential Manager) need nothing installed.
      - name: Install secret backend tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gnome-keyring dbus libsecret-tools pass gnupg

      # Compile the host's native backend and run its unit tests. On Linux this
      # is now a pure compile (no library to link — ADR-0010); it does NOT touch
      # any real credential store.
      - name: Compile native backend
        working-directory: packages/core
        run: zig build test-secrets

      # Live round-trip against the real OS keychain (set / get / overwrite /
      # delete a throwaway entry). macOS Keychain and Windows Credential Manager
      # are available directly for the logged-in runner user.
      - name: Live round-trip (macOS Keychain / Windows Credential Manager)
        if: runner.os != 'Linux'
        working-directory: packages/core
        run: zig build test-secrets-live

      # On Linux both runtime backends are exercised, each forced explicitly via
      # ZCLI_SECRETS_BACKEND so the run is deterministic (and the override path is
      # covered too).
      #
      # Secret Service path: bring up a private session bus (dbus-run-session)
      # with an unlocked gnome-keyring registering org.freedesktop.secrets, so
      # `secret-tool` has a service. Recipe mirrors GNOME's own headless setup.
      - name: Live round-trip (Linux Secret Service via secret-tool)
        if: runner.os == 'Linux'
        working-directory: packages/core
        shell: bash
        run: |
          dbus-run-session -- bash -c '
            set -e
            echo "" | gnome-keyring-daemon --unlock --components=secrets
            # Wait until the secrets service owns its name on the bus; fail loudly
            # rather than run the test against a keyring that never came up.
            ready=
            for i in $(seq 1 30); do
              if dbus-send --session --dest=org.freedesktop.DBus \
                   --type=method_call --print-reply \
                   /org/freedesktop/DBus org.freedesktop.DBus.GetNameOwner \
                   string:org.freedesktop.secrets >/dev/null 2>&1; then
                echo "org.freedesktop.secrets ready after ${i}s"; ready=1; break
              fi
              sleep 1
            done
            [ -n "$ready" ] || { echo "ERROR: org.freedesktop.secrets never came up"; exit 1; }
            ZCLI_SECRETS_BACKEND=secret-service zig build test-secrets-live
          '

      # pass path: a throwaway, passphrase-less GPG key in an isolated GNUPGHOME
      # (loopback pinentry so nothing prompts), and an isolated password store.
      # No session bus is needed — this is the headless case pass exists to serve.
      - name: Live round-trip (Linux pass)
        if: runner.os == 'Linux'
        working-directory: packages/core
        shell: bash
        run: |
          set -e
          export GNUPGHOME="$(mktemp -d)"
          export PASSWORD_STORE_DIR="$(mktemp -d)"
          printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
          printf 'pinentry-mode loopback\n'  > "$GNUPGHOME/gpg.conf"
          gpg --batch --pinentry-mode loopback --passphrase '' \
            --quick-generate-key 'zcli CI <ci@zcli.invalid>' default default never
          pass init 'zcli CI <ci@zcli.invalid>'
          ZCLI_SECRETS_BACKEND=pass zig build test-secrets-live

  examples:
    name: canonical examples compile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.examples == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # The `ghauth` and `oauth-device` examples opt into zcli_secrets, whose
      # Linux backend now shells out at runtime instead of linking libsecret
      # (ADR-0010) — so compiling the examples needs no dev headers on any
      # platform.
      #
      # The canonical example CLIs are the idiom source AND the drift-detector
      # (ADR-0004): compiling them here means a framework change that breaks the
      # documented idioms fails CI, rather than silently rotting the examples
      # (and the AI context sourced from them).
      #
      # This job only compiles (install-target) the examples — it deliberately
      # does NOT run their `zig build test` (#345's premise). That's not a gap:
      # the root `test_projects` loop in build.zig already runs `zig build
      # test` as a subprocess in every example directory (exercising each
      # command's `addCommandTests` blocks), and that loop feeds the root
      # `test` step, which is exactly what the `test` job below runs via
      # `zig build test` on all three OSes. Adding a second `zig build test`
      # here would just re-run the same work a second time on a fourth OS.
      - name: Build all example CLIs
        run: zig build build-examples

  e2e:
    name: zcli end-to-end tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Runs the built zcli binary against throwaway temp projects, including a
      # tier that scaffolds a project and builds it against the local tree, and
      # an interactive tier that drives prompts through a real terminal.
      #
      # The interactive terminal harness runs on all three OSes: POSIX uses a PTY
      # (the harness has caught macOS-specific bugs: its 4 KiB PTY buffer,
      # EIO-on-close semantics), Windows uses a ConPTY. Every interactive tier —
      # including `zcli dev`'s watch/rebuild loop (nightwatch's ReadDirectoryChangesW
      # backend) — exercises the terminal stack on every platform.
      #
      # The interactive tests degrade to a skip — not a failure — where the
      # pseudo-terminal can't be allocated, so a green run could silently lose
      # that coverage. ZCLI_REQUIRE_INTERACTIVE=1 makes the harness hard-fail
      # instead of skip in that case, proving the tier actually ran on every OS.
      - name: Run e2e tests
        working-directory: projects/zcli
        shell: bash
        env:
          ZCLI_REQUIRE_INTERACTIVE: "1"
        run: zig build e2e

  # The single required status check for branch protection — the ruleset
  # requires ONLY this job (plus nothing else), never the per-job or per-leg
  # names. Two reasons:
  #
  #   1. Skipped MATRIX jobs break per-leg required checks: when a job with a
  #      strategy matrix is skipped by its job-level `if:`, GitHub never
  #      expands the matrix — it reports one skipped check run with the
  #      literal, un-substituted name (observed: "zcli_secrets backend
  #      (${{ matrix.os }})"), so required contexts like "zcli_secrets
  #      backend (ubuntu-latest)" are never created and sit at "Expected"
  #      forever. A gate that is itself never skipped sidesteps this.
  #   2. It fails when `changes` fails. Downstream jobs skipped because a
  #      needed job FAILED still read as satisfied to branch protection — so
  #      without this, a broken path filter could merge a PR with zero tests
  #      run. Here a failed `changes` surfaces as this job failing.
  #
  # `if: always()` so it reports even when everything upstream was skipped;
  # skipped is an acceptable result (that's the path-gating working as
  # designed), failure and cancellation are not. Adding or removing jobs or
  # matrix legs needs no ruleset edit — only membership in `needs` below.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - changes
      - fmt
      - version-sync
      - test
      - windows-release-build
      - linux-musl-release-build
      - secrets
      - examples
      - e2e
    steps:
      - name: Fail if any needed job failed or was cancelled
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          bad=$(echo "$RESULTS" | jq -r '[to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key] | join(", ")')
          if [ -n "$bad" ]; then
            echo "::error::jobs failed or were cancelled: $bad"
            exit 1
          fi
          echo "all jobs succeeded or were legitimately skipped"
