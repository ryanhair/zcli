name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Runs the test suites for every package (packages/*).
      - name: Run tests
        run: zig build test

  e2e:
    name: zcli end-to-end tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Runs the built zcli binary against throwaway temp projects, including a
      # tier that scaffolds a project and builds it against the local tree.
      - name: Run e2e tests
        working-directory: projects/zcli
        run: zig build e2e
