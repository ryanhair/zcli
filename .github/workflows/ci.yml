name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fmt:
    name: zig fmt check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Explicit paths rather than "." — scripts/ and website/ contain no Zig
      # source, and this keeps cache/output dirs out of scope.
      - name: Check formatting
        run: zig fmt --check packages projects examples build.zig

  test:
    name: unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Runs the test suites for every package (packages/*) on both Linux and
      # macOS — the terminal stack is now libc-free, so this guards portability.
      - name: Run tests
        run: zig build test

  windows:
    name: windows build + smoke test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # The terminal stack has a Windows console backend (raw mode / VT input via
      # the console-mode API). Build the CLI natively here — a real Windows
      # toolchain catches native linking/ABI issues that the release's
      # cross-compile from Linux would not — then run the binary to prove it
      # actually starts and dispatches on Windows.
      - name: Build zcli (native Windows, ReleaseFast)
        working-directory: projects/zcli
        run: zig build -Doptimize=ReleaseFast

      - name: Smoke test the binary
        working-directory: projects/zcli
        shell: bash
        run: |
          ./zig-out/bin/zcli.exe --version
          ./zig-out/bin/zcli.exe --help

      # Run every package's unit tests natively — Windows is a shipped release
      # target, so "builds on Windows" isn't enough. Steps are enumerated
      # instead of using the full `zig build test` aggregate because the
      # PTY-based `testing` package is POSIX-only (and the aggregate also
      # rebuilds every subproject via subprocess, which the build job above
      # already covers for the CLI).
      - name: Run portable unit tests
        run: zig build test-core test-terminal test-vterm test-vterm_example test-zinput test-zprogress test-ztheme test-markdown_fmt

  secrets:
    name: zcli_secrets backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Linux needs libsecret + glib to LINK the Secret Service backend, plus
      # gnome-keyring + dbus to provide a running Secret Service for the live
      # round-trip. macOS (Keychain) and Windows (Credential Manager) need
      # nothing installed — the store is always available for the runner user.
      - name: Install Secret Service deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsecret-1-dev libglib2.0-dev gnome-keyring dbus libsecret-tools

      # Compile + link the host's native backend. This is the link-time half of
      # ADR-0003's opt-in guarantee — it proves the backend links against the
      # platform library — and it does NOT touch the real credential store.
      - name: Compile + link native backend
        working-directory: packages/core
        run: zig build test-secrets

      # Live round-trip against the real OS keychain (set / get / overwrite /
      # delete a throwaway entry). macOS Keychain and Windows Credential Manager
      # are available directly for the logged-in runner user.
      - name: Live round-trip (macOS Keychain / Windows Credential Manager)
        if: runner.os != 'Linux'
        working-directory: packages/core
        run: zig build test-secrets-live

      # On Linux the Secret Service must be brought up first: a private session
      # bus (dbus-run-session) with an unlocked gnome-keyring registering
      # org.freedesktop.secrets. Recipe mirrors GNOME/libsecret's own headless
      # test setup.
      - name: Live round-trip (Linux Secret Service)
        if: runner.os == 'Linux'
        working-directory: packages/core
        shell: bash
        run: |
          dbus-run-session -- bash -c '
            set -e
            echo "" | gnome-keyring-daemon --unlock --components=secrets
            # Wait until the secrets service owns its name on the bus; fail loudly
            # rather than run the test against a keyring that never came up.
            ready=
            for i in $(seq 1 30); do
              if dbus-send --session --dest=org.freedesktop.DBus \
                   --type=method_call --print-reply \
                   /org/freedesktop/DBus org.freedesktop.DBus.GetNameOwner \
                   string:org.freedesktop.secrets >/dev/null 2>&1; then
                echo "org.freedesktop.secrets ready after ${i}s"; ready=1; break
              fi
              sleep 1
            done
            [ -n "$ready" ] || { echo "ERROR: org.freedesktop.secrets never came up"; exit 1; }
            zig build test-secrets-live
          '

  examples:
    name: canonical examples compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # The `ghauth` example opts into zcli_secrets, whose Linux backend links
      # libsecret at build time (ADR-0003). Compiling the examples therefore
      # needs the dev headers on Linux; macOS/Windows keychains link nothing.
      - name: Install Secret Service deps (for the ghauth example)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsecret-1-dev libglib2.0-dev

      # The canonical example CLIs are the idiom source AND the drift-detector
      # (ADR-0004): compiling them here means a framework change that breaks the
      # documented idioms fails CI, rather than silently rotting the examples
      # (and the AI context sourced from them).
      - name: Build all example CLIs
        run: zig build build-examples

  e2e:
    name: zcli end-to-end tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # Runs the built zcli binary against throwaway temp projects, including a
      # tier that scaffolds a project and builds it against the local tree, and
      # an interactive tier that drives prompts through a real PTY.
      #
      # The interactive PTY harness is POSIX-only (no Windows ConPTY backend
      # yet), so Linux and macOS cover both kernels' PTY behavior (the harness
      # has caught macOS-specific bugs: its 4 KiB PTY buffer, EIO-on-close
      # semantics). On Windows the interactive tier self-skips
      # (runInteractive → UnsupportedPlatform); the non-interactive and
      # scaffold-and-build tiers still run, exercising path handling, the
      # .exe suffix, and the `zig build` subprocess flow natively.
      #
      # On POSIX the interactive tests degrade to a skip — not a failure — where
      # PTY allocation is denied, so a green run could silently lose that
      # coverage; grep the log to prove the PTY tier actually ran. That guard is
      # POSIX-only: on Windows the tier is intentionally absent, not skipped.
      - name: Run e2e tests
        working-directory: projects/zcli
        shell: bash
        run: |
          set -eo pipefail
          zig build e2e 2>&1 | tee e2e.log
          if [ "$RUNNER_OS" != "Windows" ] && grep -q "runInteractive unavailable" e2e.log; then
            echo "ERROR: interactive PTY tests were skipped (PTY allocation unavailable)"
            exit 1
          fi
