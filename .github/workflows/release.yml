name: Release

on:
  push:
    tags:
      - "*-v*"  # CLI releases (e.g., zcli-v0.9.0)
      - "v*"    # Library releases (e.g., v0.9.0)
  # One-button release: pick a version, CI bumps both build.zig.zon files,
  # stages the bump on a scratch branch, runs the full test + build gate
  # against it, and only THEN commits to main and tags v<version> +
  # zcli-v<version> (see the `finalize` job). Manual tag pushes above still
  # work as a fallback and skip the bump/finalize dance entirely.
  workflow_dispatch:
    inputs:
      version:
        description: "New version, semver only (e.g. 0.20.0). Bumps both build.zig.zon files, tags, and publishes the CLI + library release."
        required: true
        type: string

# Only the jobs that publish get write access.
permissions:
  contents: read

# Release runs must not interleave: a second dispatch (or a manual tag push
# racing a dispatch) could otherwise race the main-branch push, tag creation,
# or draft/publish steps below. One queue for the whole workflow, not just
# same-ref runs, since a dispatch and a manual tag push never share a ref.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Resolves what this run should do — for a tag push, read the tag; for a
  # manual dispatch, compute the version bump and stage it on a disposable
  # branch (NOT main) so the test/build gate below runs against real code
  # without touching main or creating tags yet. The `finalize` job promotes
  # the staged commit to main and cuts the real tags only after tests (and,
  # for CLI releases, the cross-target build) succeed — see #301.
  setup:
    name: Resolve release plan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      do_cli: ${{ steps.plan.outputs.do_cli }}
      do_lib: ${{ steps.plan.outputs.do_lib }}
      ref: ${{ steps.plan.outputs.ref }}
      cli_tag: ${{ steps.plan.outputs.cli_tag }}
      lib_version: ${{ steps.plan.outputs.lib_version }}
      staging_branch: ${{ steps.plan.outputs.staging_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history + tags so the dispatch path can detect an
          # already-used version and diff against main.
          fetch-depth: 0

      - name: Plan
        id: plan
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -eo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::version must be semver like 0.20.0 (got '$VERSION')"
              exit 1
            fi
            if git rev-parse -q --verify "refs/tags/zcli-v$VERSION" >/dev/null \
              || git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
              echo "::error::a tag for $VERSION already exists — pick a new version"
              exit 1
            fi

            # Bump the top-level .version field in both manifests. The anchored
            # 4-space indent avoids the commented ".version" mention in the root
            # manifest's dependency notes.
            for f in build.zig.zon projects/zcli/build.zig.zon; do
              sed -i -E "s/^([[:space:]]*)\.version = \"[0-9]+\.[0-9]+\.[0-9]+\"/\1.version = \"$VERSION\"/" "$f"
              grep -q "\.version = \"$VERSION\"" "$f" || { echo "::error::failed to bump $f"; exit 1; }
            done

            # Keep the README Quick Start's pinned dependency tag on the
            # release being cut (the version-sync CI job enforces this).
            sed -i -E "s|(/zcli/archive/refs/tags/v)[0-9]+\.[0-9]+\.[0-9]+(\.tar\.gz)|\1$VERSION\2|" README.md
            grep -q "refs/tags/v$VERSION.tar.gz" README.md || { echo "::error::failed to bump README.md"; exit 1; }

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Bump version to $VERSION"

            # Stage the bump on a disposable branch instead of main. Nothing
            # lands on main and no tag exists until `finalize` promotes this
            # exact commit after tests (and the cross-target build) pass —
            # a failed run leaves main and the tag namespace untouched, so a
            # re-dispatch of the same version just works. Force-push in case
            # a previous failed attempt left a stale staging branch behind.
            STAGING_BRANCH="_release-staging/$VERSION"
            git push --force origin "HEAD:refs/heads/$STAGING_BRANCH"

            echo "do_cli=true" >> "$GITHUB_OUTPUT"
            echo "do_lib=true" >> "$GITHUB_OUTPUT"
            echo "ref=$STAGING_BRANCH" >> "$GITHUB_OUTPUT"
            echo "cli_tag=zcli-v$VERSION" >> "$GITHUB_OUTPUT"
            echo "lib_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "staging_branch=$STAGING_BRANCH" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "ref=$TAG" >> "$GITHUB_OUTPUT"
            case "$TAG" in
              zcli-v*)
                echo "do_cli=true" >> "$GITHUB_OUTPUT"
                echo "do_lib=false" >> "$GITHUB_OUTPUT"
                echo "cli_tag=$TAG" >> "$GITHUB_OUTPUT"
                ;;
              v*)
                echo "do_cli=false" >> "$GITHUB_OUTPUT"
                echo "do_lib=true" >> "$GITHUB_OUTPUT"
                echo "lib_version=${TAG#v}" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::unrecognized tag '$TAG'"
                exit 1
                ;;
            esac
          fi

  # Nothing enforces that a tag points at a commit that passed CI, so the
  # release gates on the same unit + e2e coverage CI runs. A bad tag/staged
  # bump must fail here, not ship. The gate runs for BOTH CLI and library
  # paths: a bare `git push origin v*` (library-only tag) must also pass
  # tests before the library release publishes.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: setup
    if: needs.setup.outputs.do_cli == 'true' || needs.setup.outputs.do_lib == 'true'
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Run unit tests
        shell: bash
        run: zig build test

      # Mirror ci.yml's e2e gate, guard included: the interactive tier degrades
      # to a skip (not a failure) where a pseudo-terminal can't be allocated, so
      # ZCLI_REQUIRE_INTERACTIVE=1 makes the harness hard-fail instead — a
      # release must not ship with that coverage silently dropped on any OS.
      - name: Run e2e tests
        working-directory: projects/zcli
        shell: bash
        env:
          ZCLI_REQUIRE_INTERACTIVE: "1"
        run: zig build e2e

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [setup, test]
    if: needs.setup.outputs.do_cli == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            zig_target: x86_64-linux-musl
            smoke: true # static musl binary runs on the x64 runner
          - os: ubuntu-latest
            target: aarch64-linux
            zig_target: aarch64-linux-musl
            # Not smoke-tested: emulating aarch64 on the x64 runner needs
            # qemu-user-static. See #334 — accepted gap, documented in
            # docs/RELEASE-SIGNING.md.
          - os: macos-latest
            target: x86_64-macos
            zig_target: x86_64-macos
            smoke: true # macos-latest runners are arm64; run via Rosetta 2
            rosetta: true
          - os: macos-latest
            target: aarch64-macos
            zig_target: aarch64-macos
            smoke: true # macos-latest runners are arm64
          - os: ubuntu-latest
            target: x86_64-windows
            zig_target: x86_64-windows
            # Not smoke-tested: would need Wine on the Linux runner. See
            # #334 — accepted gap, documented in docs/RELEASE-SIGNING.md.
          - os: ubuntu-latest
            target: aarch64-windows
            zig_target: aarch64-windows
            # Not smoke-tested: same as x86_64-windows, plus Wine has no
            # aarch64 Windows emulation story. See #334.

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Build zcli
        run: |
          cd projects/zcli
          zig build -Doptimize=ReleaseSafe -Dstrip=true -Dtarget=${{ matrix.zig_target }}

      - name: Package binary
        shell: bash
        run: |
          cd projects/zcli
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp zig-out/bin/zcli.exe dist/zcli-${{ matrix.target }}.exe
          else
            cp zig-out/bin/zcli dist/zcli-${{ matrix.target }}
            chmod +x dist/zcli-${{ matrix.target }}
          fi

      # aarch64-macos runs natively on the macos-latest (arm64) runner;
      # x86_64-macos needs Rosetta 2 installed first to run under emulation.
      - name: Install Rosetta 2
        if: matrix.rosetta
        run: softwareupdate --install-rosetta --agree-to-license

      # Prove the artifact we're about to publish actually starts, on the
      # targets the runner can execute (natively or via Rosetta). Mirrors
      # ci.yml's Windows smoke test. The remaining cross-compiled targets
      # (aarch64-linux, both Windows targets) are validated for linking only
      # — see #334 for the accepted-gap rationale.
      - name: Smoke test the binary
        if: matrix.smoke
        working-directory: projects/zcli
        run: |
          ./dist/zcli-${{ matrix.target }} --version
          ./dist/zcli-${{ matrix.target }} --help

      - name: Generate checksum
        shell: bash
        run: |
          cd projects/zcli/dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            shasum -a 256 zcli-${{ matrix.target }}.exe > zcli-${{ matrix.target }}.exe.sha256
          else
            shasum -a 256 zcli-${{ matrix.target }} > zcli-${{ matrix.target }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zcli-${{ matrix.target }}
          path: projects/zcli/dist/zcli-${{ matrix.target }}*

  # Promotes the staged version-bump commit to main and cuts the real tags —
  # but only for the workflow_dispatch path, and only once tests (and the
  # full cross-target build, transitively via `needs: build`) have passed.
  # A manual tag push skips this entirely: the tag already exists on a real
  # commit before the workflow even starts. See #301.
  #
  # Gated behind the `release` GitHub Environment (#292): a required
  # reviewer must approve before this job (or `release` / `library-release`
  # below, which share the same environment) is allowed to run. This YAML is
  # inert until that Environment is created in repo settings — see the PR
  # description.
  finalize:
    name: Promote staged release to main
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: github.event_name == 'workflow_dispatch'
    environment: release
    permissions:
      contents: write
    steps:
      # Environment gating is a repo-settings fact this YAML cannot see: if
      # the `release` environment loses its required-reviewers rule, the
      # gate is silently inert (the 0.20.0 release proved it, #397). This
      # runs first in every environment-gated job — an unprotected
      # environment starts the job immediately, and this step then refuses
      # to proceed. Fail-closed: an unreadable environment also fails.
      - name: Assert the release environment is protected
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rules=$(gh api "repos/$GITHUB_REPOSITORY/environments/release" --jq '[.protection_rules[].type]') || {
            echo "::error::cannot read the 'release' environment — it must exist with a required-reviewers rule (Settings → Environments)"; exit 1; }
          echo "protection rules: $rules"
          echo "$rules" | grep -q required_reviewers || {
            echo "::error::the 'release' environment has NO required-reviewers rule — the approval gate is inert (#397); refusing to publish"; exit 1; }

      - name: Checkout staged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.setup.outputs.ref }}
          fetch-depth: 0

      - name: Push to main and cut tags
        shell: bash
        env:
          LIB_VERSION: ${{ needs.setup.outputs.lib_version }}
          STAGING_BRANCH: ${{ needs.setup.outputs.staging_branch }}
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:main
          git tag "v$LIB_VERSION"
          git tag "zcli-v$LIB_VERSION"
          git push origin "v$LIB_VERSION" "zcli-v$LIB_VERSION"
          # Clean up the scratch branch now that main + the real tags carry
          # this commit. Best-effort: a failure here shouldn't fail the run.
          git push origin --delete "$STAGING_BRANCH" || true

  release:
    name: Create Release
    needs: [setup, build, finalize]
    if: |
      always() &&
      needs.setup.outputs.do_cli == 'true' &&
      needs.build.result == 'success' &&
      (needs.finalize.result == 'success' || needs.finalize.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      # See the identical step in `finalize` — the tag-push path skips
      # finalize, so every environment-gated job carries the check (#397).
      - name: Assert the release environment is protected
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rules=$(gh api "repos/$GITHUB_REPOSITORY/environments/release" --jq '[.protection_rules[].type]') || {
            echo "::error::cannot read the 'release' environment — it must exist with a required-reviewers rule (Settings → Environments)"; exit 1; }
          echo "protection rules: $rules"
          echo "$rules" | grep -q required_reviewers || {
            echo "::error::the 'release' environment has NO required-reviewers rule — the approval gate is inert (#397); refusing to publish"; exit 1; }

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.setup.outputs.cli_tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist

      - name: Flatten artifact structure
        shell: bash
        run: |
          mkdir -p release
          find dist -type f -name 'zcli-*' -exec cp {} release/ \;
          ls -la release/

      - name: Create checksums file
        shell: bash
        run: |
          cd release
          cat *.sha256 > checksums.txt
          rm *.sha256

      # Published as a DRAFT on purpose. The release is signed offline with a key
      # that never touches CI (ADR-0023): the maintainer runs `scripts/sign-release.sh`
      # to sign checksums.txt, upload checksums.txt.minisig, and flip the release
      # to published. Drafting until signed means fail-closed clients never see an
      # unsigned release. See docs/RELEASE-SIGNING.md.
      - name: Create Release (draft — sign locally to publish)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.setup.outputs.cli_tag }}
          files: release/*
          generate_release_notes: true
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Signing reminder
        run: |
          echo "::notice title=Sign this release::CLI release ${{ needs.setup.outputs.cli_tag }} is a DRAFT. Run 'scripts/sign-release.sh ${{ needs.setup.outputs.cli_tag }}' locally to sign checksums.txt and publish. See docs/RELEASE-SIGNING.md."

  library-release:
    name: Create Library Release
    needs: [setup, test, finalize]
    if: |
      always() &&
      needs.setup.outputs.do_lib == 'true' &&
      needs.test.result == 'success' &&
      (needs.finalize.result == 'success' || needs.finalize.result == 'skipped')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      # See the identical step in `finalize` — the tag-push path skips
      # finalize, so every environment-gated job carries the check (#397).
      - name: Assert the release environment is protected
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rules=$(gh api "repos/$GITHUB_REPOSITORY/environments/release" --jq '[.protection_rules[].type]') || {
            echo "::error::cannot read the 'release' environment — it must exist with a required-reviewers rule (Settings → Environments)"; exit 1; }
          echo "protection rules: $rules"
          echo "$rules" | grep -q required_reviewers || {
            echo "::error::the 'release' environment has NO required-reviewers rule — the approval gate is inert (#397); refusing to publish"; exit 1; }

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: v${{ needs.setup.outputs.lib_version }}

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      # `zig fetch <url>` (no --save) fetches the tarball, computes its
      # package hash, and prints exactly that hash to stdout — the same
      # value a consumer would get pasting the URL into their own
      # build.zig.zon. Substituted into the release notes below instead of
      # a "go run zig fetch yourself" placeholder. See #336.
      - name: Compute package hash
        id: hash
        shell: bash
        run: |
          set -eo pipefail
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${{ needs.setup.outputs.lib_version }}.tar.gz"
          HASH="$(zig fetch "$URL" | tail -n1 | tr -d '[:space:]')"
          if [ -z "$HASH" ]; then
            echo "::error::zig fetch produced no hash for $URL"
            exit 1
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          cat > release-notes.md << 'EOF'
          # zcli Framework v${{ needs.setup.outputs.lib_version }}

          This is the zcli framework library release. Use this version in your `build.zig.zon`:

          ```zig
          .dependencies = .{
              .zcli = .{
                  .url = "https://github.com/${{ github.repository }}/archive/refs/tags/v${{ needs.setup.outputs.lib_version }}.tar.gz",
                  .hash = "${{ steps.hash.outputs.hash }}",
              },
          },
          ```

          ## Installation

          Run `zig fetch --save <url>` to add this dependency to your project.

          ## What's Included

          - Core zcli framework
          - Build utilities for command generation
          - Built-in plugins (help, version, not-found, completions, config, secrets, github-upgrade)
          - All supporting packages (vterm, markdown, etc.)

          ## Getting Started

          Use the zcli CLI tool to scaffold a new project:

          ```bash
          # Download the zcli CLI from the latest zcli-v* release
          # Or build from source
          zcli init my-app
          cd my-app
          zig build
          ```

          For the zcli CLI tool binaries, see the zcli-v* releases.
          EOF

      - name: Create Library Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ needs.setup.outputs.lib_version }}
          body_path: release-notes.md
          name: zcli Framework v${{ needs.setup.outputs.lib_version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
