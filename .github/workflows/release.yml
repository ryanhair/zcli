name: Release

on:
  push:
    tags:
      - "*-v*"  # CLI releases (e.g., zcli-v0.9.0)
      - "v*"    # Library releases (e.g., v0.9.0)

# Only the jobs that publish get write access.
permissions:
  contents: read

jobs:
  # Nothing enforces that a tag points at a commit that passed CI, so the
  # release gates on the same unit + e2e coverage CI runs. A bad tag must
  # fail here, not ship.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/zcli-v')
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Run unit tests
        run: zig build test

      - name: Run e2e tests
        working-directory: projects/zcli
        run: zig build e2e

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: test
    # Only build binaries for CLI releases (zcli-v*)
    if: startsWith(github.ref, 'refs/tags/zcli-v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            zig_target: x86_64-linux-musl
            smoke: true # static musl binary runs on the x64 runner
          - os: ubuntu-latest
            target: aarch64-linux
            zig_target: aarch64-linux-musl
          - os: macos-latest
            target: x86_64-macos
            zig_target: x86_64-macos
          - os: macos-latest
            target: aarch64-macos
            zig_target: aarch64-macos
            smoke: true # macos-latest runners are arm64
          - os: ubuntu-latest
            target: x86_64-windows
            zig_target: x86_64-windows
          - os: ubuntu-latest
            target: aarch64-windows
            zig_target: aarch64-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Build zcli
        run: |
          cd projects/zcli
          zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}

      - name: Package binary
        shell: bash
        run: |
          cd projects/zcli
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp zig-out/bin/zcli.exe dist/zcli-${{ matrix.target }}.exe
          else
            cp zig-out/bin/zcli dist/zcli-${{ matrix.target }}
            chmod +x dist/zcli-${{ matrix.target }}
          fi

      # Prove the artifact we're about to publish actually starts, on the
      # targets the runner can execute natively. Mirrors ci.yml's Windows
      # smoke test.
      - name: Smoke test the binary
        if: matrix.smoke
        working-directory: projects/zcli
        run: |
          ./dist/zcli-${{ matrix.target }} --version
          ./dist/zcli-${{ matrix.target }} --help

      - name: Generate checksum
        shell: bash
        run: |
          cd projects/zcli/dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            shasum -a 256 zcli-${{ matrix.target }}.exe > zcli-${{ matrix.target }}.exe.sha256
          else
            shasum -a 256 zcli-${{ matrix.target }} > zcli-${{ matrix.target }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zcli-${{ matrix.target }}
          path: projects/zcli/dist/zcli-${{ matrix.target }}*

  release:
    name: Create Release
    needs: build
    # Run for CLI releases (after build completes)
    if: startsWith(github.ref, 'refs/tags/zcli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist

      - name: Flatten artifact structure
        shell: bash
        run: |
          mkdir -p release
          find dist -type f -name 'zcli-*' -exec cp {} release/ \;
          ls -la release/

      - name: Create checksums file
        shell: bash
        run: |
          cd release
          cat *.sha256 > checksums.txt
          rm *.sha256

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  library-release:
    name: Create Library Release
    # Run for library releases (v* tags)
    if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/zcli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Library version: $TAG"

      - name: Generate release notes
        id: notes
        run: |
          cat > release-notes.md << 'EOF'
          # zcli Framework v${{ steps.version.outputs.version }}

          This is the zcli framework library release. Use this version in your `build.zig.zon`:

          ```zig
          .dependencies = .{
              .zcli = .{
                  .url = "https://github.com/ryanhair/zcli/archive/refs/tags/v${{ steps.version.outputs.version }}.tar.gz",
                  .hash = "<hash-will-be-shown-by-zig-fetch>",
              },
          },
          ```

          ## Installation

          Run `zig fetch --save <url>` to add this dependency to your project.

          ## What's Included

          - Core zcli framework
          - Build utilities for command generation
          - Built-in plugins (help, version, not-found, completions, github-upgrade)
          - All supporting packages (vterm, markdown-fmt, etc.)

          ## Getting Started

          Use the zcli CLI tool to scaffold a new project:

          ```bash
          # Download the zcli CLI from the latest zcli-v* release
          # Or build from source
          zcli init my-app
          cd my-app
          zig build
          ```

          For the zcli CLI tool binaries, see the zcli-v* releases.
          EOF

      - name: Create Library Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: release-notes.md
          name: zcli Framework v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
