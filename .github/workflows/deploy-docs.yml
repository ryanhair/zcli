name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "CHANGELOG.md"
      - "install.sh"
      - "install.ps1"
      - "build.zig.zon"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download Zine
        # Verify before executing: this job holds the Cloudflare token and
        # publishes install.sh, and GitHub release assets are mutable — a
        # swapped tarball must fail the build, not run. Update the hash
        # alongside the version when bumping Zine.
        run: |
          curl -fsSL -o zine.tar.xz https://github.com/kristoff-it/zine/releases/download/v0.11.3/x86_64-linux-musl.tar.xz
          echo "c25e5372b8a5d2759f2b7e581aefb90c8019ff0056a230a97efe3c8edab3bc19  zine.tar.xz" | sha256sum -c -
          tar -xf zine.tar.xz
          mv zine website/zine
          chmod +x website/zine

      - name: Sync site data from build.zig.zon
        run: ./website/sync-site-data.sh

      - name: Build site
        working-directory: website
        run: ./zine release

      - name: Publish install scripts at site root
        run: |
          cp install.sh website/public/install.sh
          cp install.ps1 website/public/install.ps1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/public --project-name=zcli --branch=main
