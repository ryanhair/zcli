name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Zine
        run: |
          curl -fsSL -o zine.tar.xz https://github.com/kristoff-it/zine/releases/download/v0.11.3/x86_64-linux-musl.tar.xz
          tar -xf zine.tar.xz
          mv zine website/zine
          chmod +x website/zine

      - name: Build site
        working-directory: website
        run: ./zine release

      - name: Publish install.sh at site root
        run: cp install.sh website/public/install.sh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/public --project-name=zcli --branch=main
